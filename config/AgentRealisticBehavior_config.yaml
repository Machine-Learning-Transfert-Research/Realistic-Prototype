behaviors:
  AgentRealisticBehavior:
    trainer_type: ppo
    hyperparameters:
        batch_size: 2048
        beta: 1.0e-2
        buffer_size: 20480
        epsilon: 0.2
        lambd: 0.95
        learning_rate: 3.0e-4
        learning_rate_schedule: linear
        num_epoch: 3
    network_settings:
        normalize: true
        hidden_units: 512
        num_layers: 3
    reward_signals:
        extrinsic:
            strength: 1.0
            gamma: 0.99
    max_steps: 3000000
    time_horizon: 128
    summary_freq: 20000
    checkpoint_interval: 100000
    keep_checkpoints: 35
    threaded: false
